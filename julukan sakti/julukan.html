<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Generator Julukan Sakti</title>
  <meta name="description"
    content="Ketik nama, biarkan semesta menentukan julukanmu. Generator julukan epik, lucu, mistis, sampai elegan untuk hadiah." />
  <meta name="theme-color" content="#14211B" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Branding kecil: identitas pembuat, bukan navbar, bukan sticky -->
  <p class="brand">
    <span class="brand__title">Curator of Unnecessary Greatness</span>
    <span class="brand__tagline">Turning ordinary names into extraordinary nonsense</span>
  </p>

  <header class="hero">
    <h1 class="hero__title">Julukan Sakti</h1>
  </header>

  <!-- Compose bar: tetap terlihat saat scroll, mendukung alur "ketik → klik → ulangi" -->
  <section class="compose" aria-label="Form pembuat julukan">
    <input id="nameInput" class="compose__input" type="text" inputmode="text" autocomplete="off" maxlength="30"
      placeholder="Ketik nama di sini…" aria-label="Nama" />
    <div class="compose__actions">
      <button id="btnGenerate" class="btn btn-primary" type="button">⚡ Bangkitkan Julukan</button>
      <button id="btnGift" class="btn btn-secondary" type="button">🎁 Gift</button>
    </div>
    <button id="btnClear" class="btn-clear" type="button">🗑️ Hapus Semua</button>
  </section>

  <main>
    <p id="emptyState" class="empty-state" hidden>
      Belum ada julukan di sini.<br />Ketik nama lalu tekan salah satu tombol di atas.
    </p>
    <div id="feed" class="feed" aria-live="polite"></div>
  </main>

  <footer class="footer">
    <p>Dibuat untuk hiburan. Generate sebanyak yang kamu mau ✨</p>
  </footer>

  <!-- Database (dipisah per kategori, mudah diperbesar tanpa ubah logika) -->
  <script src="data/titles.js"></script>
  <script src="data/adjectives.js"></script>
  <script src="data/objects.js"></script>
  <script src="data/locations.js"></script>
  <script src="data/templates.js"></script>
  <script src="data/gift_titles.js"></script>
  <script src="data/gift_objects.js"></script>
  <script src="data/gift_templates.js"></script>

  <!-- Logika aplikasi (modular: akses data → generator → render → event handler) -->
  <script src="js/database.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
