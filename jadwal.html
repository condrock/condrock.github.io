<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grup C - Jadwal Kerja Magang Cargloss</title>
    <meta name="description"
        content="Jadwal kerja magang Grup C Cargloss yang diperbarui otomatis berdasarkan sistem 6 hari kerja dan 2 hari libur. Menampilkan status kerja atau libur hari ini secara realtime serta informasi siklus shift Grup C.">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background: #0b1220;
            color: white;
            font-family: Arial;
            padding: 30px 10px;
        }

        .wrapper {
            width: 100%;
            max-width: 520px;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-title {
            font-size: 25px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .date {
            font-size: 18px;
            margin-top: 10px;
        }

        .card {
            text-align: center;
            width: 95%;
            max-width: 520px;
        }

        .icon {
            font-size: 80px;
            margin: 10px 0;
        }

        .work-icon {
            color: #22c55e;
        }

        .off-icon {
            color: #ef4444;
        }

        .big {
            font-size: 92px;
            font-weight: 900;
        }

        .work {
            color: #22c55e;
        }

        .off {
            color: #ef4444;
        }

        .sub {
            font-size: 18px;
            opacity: 0.8;
        }

        .box {
            margin-top: 22px;
            background: #111827;
            padding: 14px;
            border-radius: 14px;
            text-align: left;
        }

        .titleBox {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 15px;
        }

        .row i {
            font-size: 18px;
            vertical-align: middle;
            margin-right: 5px;
        }

        .auto-note {
            margin-top: 18px;
            font-size: 16px;
            opacity: 0.8;
            text-align: center;
            max-width: 420px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="card">

            <!-- title -->
            <div class="card-title">Magang Grup C </br> Cargloss MKM</div>

            <!-- icon -->
            <span id="icon" class="material-icons icon"></span>

            <!-- tanggal -->
            <div id="todayDate" class="date"></div>

            <!-- hasil -->
            <div id="status" class="big"></div>

            <div id="sub" class="sub"></div>

            <!-- preview -->
            <div class="box">
                <div class="titleBox">8 Hari Siklus</div>
                <div id="preview"></div>
            </div>

        </div>

        <!-- note bawah card -->
        <div class="auto-note">
            Jadwal ini dihasilkan otomatis secara realtime berdasarkan sistem 6 hari kerja dan 2 hari libur.
            Data menyesuaikan tanggal perangkat Anda saat ini.
        </div>

    </div>

    <script>
        function renderSchedule() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const anchor = new Date(today.getFullYear(), 5, 2); // 2 Juni
            anchor.setHours(0, 0, 0, 0);

            const cycleLength = 8;
            const workDays = 6;
            const ONE_DAY = 1000 * 60 * 60 * 24;

            const shiftOrder = ["SHIFT 1", "SHIFT 3", "SHIFT 2"];

            const positiveMod = (n, m) => ((n % m) + m) % m;

            const diffDays = Math.floor((today.getTime() - anchor.getTime()) / ONE_DAY);
            const cycleDay = positiveMod(diffDays, cycleLength);
            const isWorkToday = cycleDay < workDays;

            const cycleIndex = Math.floor(diffDays / cycleLength);
            const currentShift = isWorkToday ? shiftOrder[positiveMod(cycleIndex, shiftOrder.length)] : "";

            document.getElementById("todayDate").innerText =
                "Hari ini: " + today.toLocaleDateString("id-ID", {
                    weekday: "long",
                    day: "2-digit",
                    month: "long",
                    year: "numeric"
                });

            const status = document.getElementById("status");
            const icon = document.getElementById("icon");
            const sub = document.getElementById("sub");

            status.classList.remove("work", "off");

            if (isWorkToday) {
                status.innerText = "KERJA";
                status.classList.add("work");

                icon.innerText = "work";
                icon.style.color = "#22c55e";

                sub.innerText = `Hari kerja aktif dalam siklus • ${currentShift}`;
            } else {
                status.innerText = "LIBUR";
                status.classList.add("off");

                icon.innerText = "beach_access";
                icon.style.color = "#ef4444";

                sub.innerText = "Hari istirahat dalam siklus";
            }

            const preview = document.getElementById("preview");
            let html = "";

            for (let i = 0; i < cycleLength; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);

                const dayDiff = Math.floor((d.getTime() - anchor.getTime()) / ONE_DAY);
                const dayCycle = positiveMod(dayDiff, cycleLength);
                const work = dayCycle < workDays;
                const previewShift = work ? shiftOrder[positiveMod(Math.floor(dayDiff / cycleLength), shiftOrder.length)] : "";

                html += `
                    <div class="row">
                        <span>
                            <i class="material-icons ${work ? 'work-icon' : 'off-icon'}">
    ${work ? "work" : "beach_access"}
</i>
                            ${d.toLocaleDateString('id-ID')}
                            ${work ? ` - ${previewShift}` : ""}
                        </span>
                        <span style="color:${work ? '#22c55e' : '#ef4444'}; font-weight:bold;">
                            ${work ? "KERJA" : "LIBUR"}
                        </span>
                    </div>
                `;
            }

            preview.innerHTML = html;
        }

        renderSchedule();
        setInterval(renderSchedule, 60 * 1000);
    </script>

</body>

</html>
