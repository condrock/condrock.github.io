<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grup C - Jadwal Kerja Magang Cargloss</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            background: #0f172a;
            font-family: Inter, Arial, sans-serif;
            color: #e5e7eb;
        }

        .wrapper {
            width: 100%;
            max-width: 520px;
        }

        .card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
        }

        .card-title {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 12px;
            color: #fff;
        }

        .date {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .icon {
            font-size: 82px;
            margin: 10px 0;
        }

        .big {
            font-size: 56px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
        }

        .work {
            color: #22c55e;
        }

        .off {
            color: #ef4444;
        }

        .sub {
            font-size: 15px;
            color: #cbd5e1;
        }

        .box {
            margin-top: 24px;
            background: #0f172a;
            border-radius: 18px;
            padding: 16px;
        }

        .box-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #fff;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            font-size: 14px;
        }

        .row:last-child {
            border-bottom: none;
        }

        .row span:first-child {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tester {
            margin-bottom: 12px;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 18px;
            padding: 14px;
            text-align: center;
        }

        .tester input {
            background: #0f172a;
            color: white;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .tester button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 6px;
        }

        .tester button:hover {
            opacity: .9;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
                border-radius: 20px;
            }

            .big {
                font-size: 48px;
            }

            .icon {
                font-size: 72px;
            }

            .row {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <!-- TESTER -->
        <div class="tester">
            <div style="margin-bottom:8px;">Test Tanggal (opsional)</div>
            <input type="date" id="testDate">
            <button onclick="renderSchedule()">Update</button>
        </div>

        <div class="card">

            <div class="card-title">Magang Grup C<br>Cargloss MKM</div>

            <span id="icon" class="material-icons icon"></span>

            <div id="todayDate" class="date"></div>

            <div id="status" class="big"></div>

            <div id="sub" class="sub"></div>

            <div class="box">
                <div class="box-title">
                    Jadwal 8 Hari Ke Depan
                </div>
                <div id="preview"></div>
            </div>

        </div>

    </div>

    <script>
        function getTodayDate() {
            const test = document.getElementById("testDate").value;
            const date = test ? new Date(test) : new Date();
            date.setHours(0, 0, 0, 0);
            return date;
        }

        function positiveMod(n, m) {
            return ((n % m) + m) % m;
        }

        function renderSchedule() {

            const today = getTodayDate();

            const anchor = new Date(2026, 5, 2); // 2 Juni 2026
            anchor.setHours(0, 0, 0, 0);

            const cycleLength = 8;
            const workDays = 6;
            const ONE_DAY = 86400000;

            const shiftOrder = ["SHIFT 1", "SHIFT 3", "SHIFT 2"];

            const diffDays = Math.floor((today - anchor) / ONE_DAY);

            const cycleDay = positiveMod(diffDays, cycleLength);
            const cycleIndex = Math.floor(diffDays / cycleLength);

            const isWork = cycleDay < workDays;
            const shift = isWork
                ? shiftOrder[positiveMod(cycleIndex, shiftOrder.length)]
                : "";

            document.getElementById("todayDate").innerText =
                today.toLocaleDateString("id-ID", {
                    weekday: "long",
                    day: "2-digit",
                    month: "long",
                    year: "numeric"
                });

            const status = document.getElementById("status");
            const icon = document.getElementById("icon");
            const sub = document.getElementById("sub");

            status.className = "big " + (isWork ? "work" : "off");

            if (isWork) {
                status.innerText = "KERJA";
                icon.innerText = "work";
                icon.style.color = "#22c55e";
                sub.innerText = "Aktif • " + shift;
            } else {
                status.innerText = "LIBUR";
                icon.innerText = "beach_access";
                icon.style.color = "#ef4444";
                sub.innerText = "Hari istirahat";
            }

            let html = "";

            for (let i = 0; i < 8; i++) {

                const d = new Date(today);
                d.setDate(today.getDate() + i);

                const dd = Math.floor((d - anchor) / ONE_DAY);
                const cd = positiveMod(dd, cycleLength);
                const wi = cd < workDays;

                const sh = wi
                    ? shiftOrder[positiveMod(Math.floor(dd / cycleLength), shiftOrder.length)]
                    : "";

                html += `
            <div class="row">
                <span>
                    <i class="material-icons" style="color:${wi ? '#22c55e' : '#ef4444'}">
                        ${wi ? "work" : "beach_access"}
                    </i>
                    ${d.toLocaleDateString("id-ID")}
                    ${wi ? " - " + sh : ""}
                </span>
                <span style="color:${wi ? '#22c55e' : '#ef4444'};font-weight:bold;">
                    ${wi ? "KERJA" : "LIBUR"}
                </span>
            </div>
        `;
            }

            document.getElementById("preview").innerHTML = html;
        }

        renderSchedule();
    </script>

</body>

</html>
