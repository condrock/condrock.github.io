<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Maker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            background: #eef1f5
        }

        .card {
            border: none;
            border-radius: 12px
        }

        .logo {
            max-height: 60px;
            object-fit: contain
        }
    </style>
</head>

<body>

    <div class="container py-4">
        <h3 class="mb-4"><i class="bi bi-receipt"></i> Invoice Maker</h3>

        <div class="row g-4">

            <div class="col-lg-5">
                <div class="card p-3 shadow-sm">

                    <input type="file" id="logoUpload" class="form-control mb-3" onchange="loadLogo(event)">
                    <textarea id="seller" class="form-control mb-2" placeholder="Penjual"></textarea>
                    <textarea id="buyer" class="form-control mb-2" placeholder="Pembeli"></textarea>
                    <input type="text" id="invoiceNumber" class="form-control mb-3" readonly>

                    <button class="btn btn-primary w-100 mb-3" onclick="addRow()">
                        <i class="bi bi-plus"></i> Tambah Item
                    </button>

                    <table class="table table-bordered" id="items">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Harga</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>

                    <input type="number" id="discount" class="form-control mb-2" placeholder="Diskon">
                    <input type="number" id="dp" class="form-control mb-2" placeholder="DP">

                    <button class="btn btn-success w-100 mb-2" onclick="generatePreview()">Preview</button>
                    <button class="btn btn-dark w-100" onclick="downloadPDF()">PDF</button>

                </div>
            </div>

            <div class="col-lg-7">
                <div class="card p-4 shadow-sm">
                    <div id="invoiceContent"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let logoData = '';

        function loadLogo(e) {
            let reader = new FileReader();
            reader.onload = () => logoData = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        }

        function formatRupiah(num) {
            num = parseFloat(num) || 0;
            return 'Rp ' + num.toLocaleString('id-ID');
        }

        function generateInvoiceNumber() {
            let d = new Date();
            document.getElementById('invoiceNumber').value = `INV/${d.getFullYear()}/${d.getMonth() + 1}/${Date.now().toString().slice(-4)}`;
        }

        generateInvoiceNumber();

        function addRow() {
            let tbody = document.querySelector('#items tbody');
            let row = document.createElement('tr');
            row.innerHTML = `
<td><input class="form-control"></td>
<td><input type="number" class="form-control" oninput="calc()"></td>
<td><input type="number" class="form-control" oninput="calc()"></td>
<td>Rp 0</td>
<td><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove();calc()">X</button></td>`;
            tbody.appendChild(row);
        }

        function calc() {
            let total = 0;
            document.querySelectorAll('#items tbody tr').forEach(r => {
                let qty = r.cells[1].querySelector('input').value;
                let price = r.cells[2].querySelector('input').value;
                let t = (qty * price) || 0;
                r.cells[3].innerText = formatRupiah(t);
                total += t;
            });
            return total;
        }

        function generatePreview() {
            let total = calc();
            let seller = document.getElementById('seller').value;
            let buyer = document.getElementById('buyer').value;
            let discount = parseFloat(document.getElementById('discount').value) || 0;
            let dp = parseFloat(document.getElementById('dp').value) || 0;

            let grand = total - discount;
            let sisa = grand - dp;

            let rowsHTML = '';
            document.querySelectorAll('#items tbody tr').forEach(r => {
                let item = r.cells[0].querySelector('input').value;
                let qty = r.cells[1].querySelector('input').value;
                let price = r.cells[2].querySelector('input').value;
                let totalCell = r.cells[3].innerText;
                rowsHTML += `<tr><td>${item}</td><td>${qty}</td><td>${formatRupiah(price)}</td><td>${totalCell}</td></tr>`;
            });

            let html = `
<div class="d-flex justify-content-between mb-3">
${logoData ? `<img src="${logoData}" class="logo">` : ''}
<div><strong>Invoice</strong><br>${document.getElementById('invoiceNumber').value}</div>
</div>

<div class="row">
<div class="col">
<strong>Billed From</strong><br>
${seller}
</div>
<div class="col">
<strong>Billed To</strong><br>
${buyer}
</div>
</div>

<table class="table table-bordered mt-3">
<tr><th>Item</th><th>Qty</th><th>Harga</th><th>Total</th></tr>
${rowsHTML}
</table>

<div class="text-end">
<p>Total: ${formatRupiah(total)}</p>
<p>Diskon: ${formatRupiah(discount)}</p>
<h5>Grand: ${formatRupiah(grand)}</h5>
<p>DP: ${formatRupiah(dp)}</p>
<h5>Sisa: ${formatRupiah(sisa)}</h5>
</div>`;

            document.getElementById('invoiceContent').innerHTML = html;
        }

        function downloadPDF() {
            html2pdf().from(document.getElementById('invoiceContent')).save();
        }
    </script>

</body>

</html>
