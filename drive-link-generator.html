<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive Direct Link Generator</title>

  <style>
    :root {
      --bg: #0b0f17;
      --card: #121826;
      --text: #e6e6e6;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --border: rgba(255, 255, 255, 0.08);
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    textarea,
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1624;
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button.secondary {
      background: transparent;
      color: var(--text);
    }

    .output {
      margin-top: 14px;
    }

    .item {
      background: #0f1624;
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 10px;
      margin-top: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .ok {
      color: var(--success);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">
      <h1>Google Drive Direct Link Generator</h1>

      <label>Single Link</label>
      <input id="singleInput" placeholder="Paste Google Drive link..." />

      <div class="row">
        <button onclick="generateSingle()">Generate</button>
        <button class="secondary" onclick="copySingle()">Copy</button>
      </div>

      <input id="singleOutput" readonly style="margin-top:10px;" />

      <div class="status" id="status"></div>

      <hr style="margin:20px 0; border:1px solid rgba(255,255,255,0.05)" />

      <label>Batch Mode (1 link per line)</label>
      <textarea id="batchInput" placeholder="Paste multiple Google Drive links..."></textarea>

      <div class="row">
        <button onclick="generateBatch()">Generate Batch</button>
        <button class="secondary" onclick="copyBatch()">Copy All</button>
      </div>

      <div class="output" id="batchOutput"></div>
    </div>
  </div>

  <script>
    function extractId(url) {
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      return match ? match[1] : null;
    }

    function buildDirect(id) {
      return `https://drive.google.com/uc?export=download&id=${id}`;
    }

    function setStatus(msg, ok = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = ok ? 'status ok' : 'status';
    }

    function generateSingle() {
      const input = document.getElementById('singleInput').value.trim();
      const id = extractId(input);

      if (!id) {
        setStatus("Link tidak valid", false);
        return;
      }

      const direct = buildDirect(id);
      document.getElementById('singleOutput').value = direct;
      setStatus("Generated successfully", true);
    }

    async function copySingle() {
      const val = document.getElementById('singleOutput').value;
      if (!val) return;

      await navigator.clipboard.writeText(val);
      setStatus("Copied to clipboard", true);
    }

    function generateBatch() {
      const input = document.getElementById('batchInput').value.split("\n");
      const out = document.getElementById('batchOutput');
      out.innerHTML = "";

      input.forEach(line => {
        const id = extractId(line.trim());
        if (!id) return;

        const direct = buildDirect(id);

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<span>${direct}</span>
      <button onclick="navigator.clipboard.writeText('${direct}')">Copy</button>`;

        out.appendChild(div);
      });
    }

    async function copyBatch() {
      const items = document.querySelectorAll('.item span');
      let all = [];
      items.forEach(i => all.push(i.textContent));
      await navigator.clipboard.writeText(all.join("\n"));
      setStatus("Batch copied", true);
    }
  </script>

</body>

</html>
