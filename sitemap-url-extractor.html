<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XML Sitemap URL Extractor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(13, 110, 253, .15), transparent 35%),
                #0f1115;
            color: #fff;
            min-height: 100vh;
        }

        .glass {
            background: rgba(20, 24, 31, .88);
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
        }

        textarea {
            resize: vertical;
            min-height: 240px;
        }

        .hint {
            font-size: .875rem;
            color: rgba(255, 255, 255, .65);
        }

        .btn-soft {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            color: #fff;
        }

        .btn-soft:hover {
            background: rgba(255, 255, 255, .11);
            color: #fff;
        }

        code {
            color: #7dd3fc;
        }
    </style>
</head>

<body>
    <main class="container py-5" style="max-width: 920px;">
        <div class="text-center mb-4">
            <h1 class="fw-semibold mb-2">XML Sitemap URL Extractor</h1>
            <p class="hint mb-0">Paste a website URL, then load sitemap automatically from <code>/sitemap.xml</code>.
            </p>
        </div>

        <div class="card glass rounded-4 mb-4">
            <div class="card-body p-4">
                <label for="siteInput" class="form-label">Website URL</label>
                <div class="input-group input-group-lg">
                    <input type="text" id="siteInput" class="form-control"
                        placeholder="https://example.com or https://example.com/blog" />
                    <button class="btn btn-primary" type="button" id="loadBtn">Load Sitemap</button>
                </div>
                <div class="d-flex flex-wrap gap-2 mt-3">
                    <button class="btn btn-soft px-4" type="button" id="copyBtn">Copy URLs</button>
                    <button class="btn btn-soft px-4" type="button" id="clearBtn">Clear</button>
                </div>
                <div class="hint mt-3" id="preview"></div>
            </div>
        </div>

        <div class="card glass rounded-4">
            <div class="card-body p-4">
                <label for="result" class="form-label">Extracted URLs</label>
                <textarea id="result" class="form-control" rows="12" readonly
                    placeholder="Your URLs will appear here..."></textarea>
            </div>
        </div>
    </main>

    <script>
        const siteInput = document.getElementById("siteInput");
        const preview = document.getElementById("preview");
        const resultArea = document.getElementById("result");

        function normalizeWebsiteUrl(raw) {
            let input = raw.trim();
            if (!input) return "";

            if (!/^https?:\/\//i.test(input)) input = "https://" + input;

            let u;
            try {
                u = new URL(input);
            } catch {
                return "";
            }

            if (u.pathname.toLowerCase().endsWith(".xml")) return u.toString();

            u.pathname = "/sitemap.xml";
            u.search = "";
            u.hash = "";
            return u.toString();
        }

        function updatePreview() {
            const sitemapUrl = normalizeWebsiteUrl(siteInput.value);
            preview.innerHTML = sitemapUrl
                ? `Target sitemap: <code>${sitemapUrl}</code>`
                : "Paste a valid website URL to generate sitemap.xml.";
        }

        siteInput.addEventListener("input", updatePreview);

        async function fetchViaProxy(targetUrl) {
            const proxies = [
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
            ];

            let lastErr = null;

            for (const proxy of proxies) {
                try {
                    const res = await fetch(proxy, { cache: "no-store" });
                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    const text = await res.text();
                    if (text && text.length > 0) return text;
                } catch (e) {
                    lastErr = e;
                }
            }

            throw lastErr || new Error("All proxies failed.");
        }

        async function loadSitemap() {
            const sitemapUrl = normalizeWebsiteUrl(siteInput.value);
            if (!sitemapUrl) {
                resultArea.value = "Error: Please enter a valid website URL.";
                return;
            }

            resultArea.value = "Loading...";

            try {
                const xml = await fetchViaProxy(sitemapUrl);
                const doc = new DOMParser().parseFromString(xml, "application/xml");

                if (doc.querySelector("parsererror")) {
                    throw new Error("Invalid XML or proxy returned non-XML content.");
                }

                const urls = [...doc.querySelectorAll("loc")]
                    .map(el => el.textContent.trim())
                    .filter(Boolean);

                if (!urls.length) {
                    resultArea.value = "No <loc> URLs found in sitemap.";
                    return;
                }

                resultArea.value = urls.join("\n");
            } catch (err) {
                resultArea.value = "Error: " + err.message;
            }
        }

        async function copyResult() {
            try {
                await navigator.clipboard.writeText(resultArea.value);
            } catch {
                resultArea.select();
                document.execCommand("copy");
            }
        }

        document.getElementById("loadBtn").addEventListener("click", loadSitemap);
        document.getElementById("copyBtn").addEventListener("click", copyResult);
        document.getElementById("clearBtn").addEventListener("click", () => {
            siteInput.value = "";
            resultArea.value = "";
            updatePreview();
        });

        updatePreview();
    </script>
</body>

</html>
