<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        h1 .material-icons {
            vertical-align: middle;
            font-size: 2rem;
            margin-right: 10px;
        }

        .table-wrapper {
            background: white;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th,
        td {
            padding: 16px 6px;
            text-align: center;
            border-bottom: 1px solid #e8ecef;
        }

        th {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.95rem;
        }

        .total-row {
            background: linear-gradient(135deg, #e8f4f8 0%, #d5f4e6 100%) !important;
            font-weight: 700;
            font-size: 1.6rem;
        }

        .grand-total {
            background: white;
            font-weight: 700;
            font-size: 2rem;
        }

        .header-row input {
            width: 100%;
            height: 40px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
            background: white;
            transition: .3s;
        }

        .header-row input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .data-row input {
            width: 60px;
            height: 60px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
            background: white;
            transition: .3s;
        }

        .data-row input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: .3s;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .controls {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 6px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: .3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        @media (max-width: 768px) {

            body {
                padding: 10px;
            }

            th,
            td {
                padding: 10px 6px;
            }

            .data-row input {
                width: 65px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>
            <span class="material-icons">inventory_2</span>
            Catatan
        </h1>

        <div class="controls">

            <button class="btn" onclick="addRow()">
                <span class="material-icons">add</span>
                Tambah Baris
            </button>

            <button class="btn" onclick="addColumn()">
                <span class="material-icons">view_column</span>
                Tambah Kolom
            </button>

            <button class="btn btn-danger" onclick="clearAllData()">
                <span class="material-icons">delete_forever</span>
                Hapus Semua
            </button>

        </div>

        <div class="table-wrapper">

            <table id="stockTable">

                <thead id="tableHead"></thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </div>

    <script>

        const STORAGE_KEY = 'stockData_v5';

        // DEFAULT 4 KOLOM
        const DEFAULT_HEADERS = [
            'Helm 1',
            'Helm 2',
            'Helm 3'
        ];

        // DEFAULT 4 BARIS
        function createDefaultRows(total = 6) {

            return Array.from({ length: total }, () => ({
                data: new Array(DEFAULT_HEADERS.length).fill('')
            }));

        }

        let headers = [...DEFAULT_HEADERS];

        let data = createDefaultRows();

        // LOAD
        function loadData() {

            const saved = localStorage.getItem(STORAGE_KEY);

            if (saved) {

                const parsed = JSON.parse(saved);

                headers = parsed.headers || [...DEFAULT_HEADERS];

                data = parsed.data?.length
                    ? parsed.data
                    : createDefaultRows();

            }

            renderTable();
        }

        // SAVE
        function saveData() {

            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify({
                    headers,
                    data
                })
            );
        }

        // RENDER TABLE
        function renderTable() {

            renderHeader();

            const tbody = document.getElementById('tableBody');

            tbody.innerHTML = '';

            // GRAND TOTAL
            const grandTotals = new Array(headers.length).fill(0);

            data.forEach(item => {

                item.data.forEach((val, col) => {

                    grandTotals[col] += parseFloat(val) || 0;

                });

            });

            const grandTotal = grandTotals.reduce((a, b) => a + b, 0);

            const grandTotalRow = document.createElement('tr');

            grandTotalRow.className = 'grand-total';

            grandTotalRow.innerHTML = `
                <td colspan="${headers.length + 1}">
                    ${grandTotal.toLocaleString()}
                </td>
            `;

            tbody.appendChild(grandTotalRow);

            // TOTAL PER KOLOM
            const totalRow = document.createElement('tr');

            totalRow.className = 'total-row';

            let totalHTML = '';

            grandTotals.forEach(total => {

                totalHTML += `<td>${total.toLocaleString()}</td>`;

            });

            totalHTML += `<td>Total</td>`;

            totalRow.innerHTML = totalHTML;

            tbody.appendChild(totalRow);

            // DATA
            data.forEach((item, rowIndex) => {

                const tr = document.createElement('tr');

                tr.className = 'data-row';

                let html = '';

                item.data.forEach((val, colIndex) => {

                    html += `
                        <td>
                            <input
                                type="number"
                                value="${val || ''}"
                                min="0"
                                step="0.01"
                                onchange="updateCell(${rowIndex}, ${colIndex}, this.value)"
                            >
                        </td>
                    `;
                });

                html += `
                    <td>
                        <button class="delete-btn" onclick="deleteRow(${rowIndex})">
                            <span class="material-icons" style="font-size:16px;">
                                delete
                            </span>
                        </button>
                    </td>
                `;

                tr.innerHTML = html;

                tbody.appendChild(tr);

            });

        }

        // RENDER HEADER
        function renderHeader() {

            const thead = document.getElementById('tableHead');

            const tr = document.createElement('tr');

            tr.className = 'header-row';

            let html = '';

            headers.forEach((header, colIndex) => {

                html += `
                    <th>
                        <input
                            type="text"
                            value="${header}"
                            placeholder="Nama Barang"
                            onchange="updateHeader(${colIndex}, this.value)"
                        >
                    </th>
                `;
            });

            html += `<th>Aksi</th>`;

            tr.innerHTML = html;

            thead.innerHTML = '';

            thead.appendChild(tr);

        }

        // UPDATE HEADER
        function updateHeader(colIndex, value) {

            headers[colIndex] = value || `Helm ${colIndex + 1}`;

            saveData();

            renderTable();
        }

        // UPDATE CELL
        function updateCell(rowIndex, colIndex, value) {

            data[rowIndex].data[colIndex] =
                value === '' ? 0 : parseFloat(value);

            saveData();

            renderTable();
        }

        // TAMBAH BARIS
        function addRow() {

            data.push({
                data: new Array(headers.length).fill('')
            });

            saveData();

            renderTable();
        }

        // TAMBAH KOLOM
        function addColumn() {

            const newColumnNumber = headers.length + 1;

            headers.push(`Helm ${newColumnNumber}`);

            data.forEach(item => {

                item.data.push('');

            });

            saveData();

            renderTable();
        }

        // HAPUS BARIS
        function deleteRow(rowIndex) {

            data.splice(rowIndex, 1);

            saveData();

            renderTable();
        }

        // RESET SEMUA
        function clearAllData() {

            const confirmDelete = confirm(
                'Semua data dan kolom tambahan akan dihapus.\n\nTabel akan kembali ke default 4 kolom dan 4 baris.\n\nLanjutkan?'
            );

            if (!confirmDelete) return;

            // Reset data
            data = createDefaultRows();

            // Reset header
            headers = [...DEFAULT_HEADERS];

            // Hapus storage
            localStorage.removeItem(STORAGE_KEY);

            saveData();

            renderTable();
        }

        // START
        loadData();

    </script>

</body>

</html>
