<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARLORD — Pattern Reflection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --void: #07080f;
            --card: #111320;
            --card2: #141728;
            --border: rgba(180, 160, 255, 0.13);
            --gold: #c8a84b;
            --gold2: #e8c96d;
            --violet: #8b6fff;
            --violet2: #b39dff;
            --star: #f0eaff;
            --muted: rgba(240, 234, 255, 0.45);
            --dim: rgba(240, 234, 255, 0.25);
        }

        html,
        body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--void);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--star);
            background-image:
                radial-gradient(1px 1px at 15% 20%, rgba(255, 255, 255, 0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 60%, rgba(200, 168, 75, 0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 15%, rgba(255, 255, 255, 0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 45%, rgba(179, 157, 255, 0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 80%, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .app {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding: 36px 24px 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-eyebrow {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3.5px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .header-title {
            font-family: 'Cinzel', serif;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--star);
            text-shadow: 0 0 40px rgba(139, 111, 255, 0.4);
            line-height: 1.25;
            overflow-wrap: break-word;
        }

        .header-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 10px;
            line-height: 1.65;
            font-weight: 300;
        }

        /* ── INPUT ── */
        .input-section {
            padding: 28px 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .input-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2.5px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .name-input {
            flex: 1;
            min-width: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            color: var(--star);
            outline: none;
            transition: border-color 0.2s;
            user-select: text;
            -webkit-user-select: text;
        }

        .name-input::placeholder {
            color: var(--dim);
        }

        .name-input:focus {
            border-color: rgba(139, 111, 255, 0.5);
        }

        .btn-explore {
            flex-shrink: 0;
            min-width: 80px;
            background: linear-gradient(135deg, #151321, #252044);
            box-shadow: 0 0 18px rgba(139, 111, 255, 0.28), inset 0 0 18px rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(200, 168, 75, 0.35);
            border-radius: 12px;
            padding: 15px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s ease;
        }

        .btn-explore:disabled {
            background: #2a2040;
            cursor: default;
            box-shadow: none;
        }

        .btn-explore:not(:disabled):hover {
            border-color: rgba(232, 201, 109, 0.7);
            box-shadow: 0 0 25px rgba(139, 111, 255, 0.45), 0 0 45px rgba(200, 168, 75, 0.15);
            transform: translateY(-1px);
        }

        .btn-explore:not(:disabled):active {
            transform: scale(0.96);
        }

        /* ── LOADING ── */
        .loading {
            padding: 48px 20px;
            text-align: center;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .loading-ring {
            width: 44px;
            height: 44px;
            border: 2px solid var(--border);
            border-top-color: var(--violet);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            font-size: 14px;
            color: var(--muted);
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        /* ── ERROR ── */
        .error-card {
            background: rgba(255, 80, 80, 0.07);
            border: 1px solid rgba(255, 80, 80, 0.2);
            border-radius: 14px;
            padding: 18px 20px;
            margin: 16px 20px 0;
            font-size: 15px;
            color: rgba(255, 160, 160, 0.9);
            display: none;
        }

        .error-card.show {
            display: block;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            padding: 52px 24px;
            text-align: center;
        }

        .empty-glyph {
            font-size: 40px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
            color: var(--dim);
            line-height: 1.7;
            font-weight: 300;
        }

        /* ── RESULT CARDS ── */
        .results {
            padding: 20px 20px 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card.gold-border {
            border-color: rgba(200, 168, 75, 0.25);
        }

        .card.violet-border {
            border-color: rgba(139, 111, 255, 0.25);
            background: linear-gradient(160deg, #111320, #0f1228);
        }

        .card-header {
            padding: 14px 20px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card.gold-border .card-header {
            background: rgba(200, 168, 75, 0.06);
        }

        .card-icon {
            font-size: 15px;
        }

        .card-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .card-body {
            padding: 18px 20px 20px;
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 21px;
            font-weight: 600;
            color: var(--star);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .card-text {
            font-size: 16px;
            line-height: 1.75;
            color: rgba(240, 234, 255, 0.82);
            font-weight: 300;
        }

        .card-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-list li {
            font-size: 16px;
            color: rgba(240, 234, 255, 0.82);
            padding-left: 20px;
            position: relative;
            line-height: 1.6;
            font-weight: 300;
        }

        .card-list li::before {
            content: '—';
            position: absolute;
            left: 0;
            color: var(--gold);
            font-size: 13px;
            top: 3px;
        }

        .reflection-question {
            font-size: 17px;
            line-height: 1.7;
            color: var(--violet2);
            font-style: italic;
            font-weight: 300;
        }

        .symbol-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .symbol-chip {
            background: rgba(139, 111, 255, 0.12);
            border: 1px solid rgba(139, 111, 255, 0.2);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            color: var(--violet2);
        }

        /* ── SCREENSHOT BUTTON ── */
        .screenshot-wrap {
            padding: 20px 20px 0;
            display: none;
        }

        .screenshot-wrap.show {
            display: block;
        }

        .btn-screenshot {
            width: 100%;
            background: linear-gradient(135deg, #0f1228, #1a1530);
            border: 1px solid rgba(200, 168, 75, 0.3);
            border-radius: 14px;
            padding: 14px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--gold2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .btn-screenshot:hover {
            border-color: rgba(200, 168, 75, 0.6);
            box-shadow: 0 0 20px rgba(200, 168, 75, 0.1);
        }

        .btn-screenshot:active {
            transform: scale(0.98);
        }

        .btn-screenshot.loading-ss {
            opacity: 0.6;
            cursor: default;
            animation: pulse 1s infinite;
        }

        /* ── SCREENSHOT TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(17, 19, 32, 0.97);
            border: 1px solid rgba(200, 168, 75, 0.4);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 13px;
            color: var(--gold2);
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── UNLOCK OVERLAY ── */
        .unlock-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .unlock-overlay.show {
            opacity: 1;
        }

        .unlock-badge {
            animation: fadeUp 0.35s ease;
            background: linear-gradient(135deg, #1a1530, #0d0f1c);
            border: 1px solid rgba(200, 168, 75, 0.5);
            border-radius: 20px;
            padding: 24px 36px;
            text-align: center;
            box-shadow: 0 0 60px rgba(139, 111, 255, 0.3);
        }

        .unlock-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .unlock-title {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--gold2);
            letter-spacing: 1px;
        }

        .unlock-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 380px) {
            .header-title {
                font-size: 24px;
                letter-spacing: 2px;
            }

            .header-sub {
                font-size: 12px;
            }

            .name-input {
                font-size: 15px;
                padding: 13px 14px;
            }

            .btn-explore {
                font-size: 12px;
                padding: 13px 12px;
                min-width: 70px;
            }
        }
    </style>
</head>

                "Tema hidupmu adalah transformasi yang tenang — bukan perubahan dramatis, tapi pergeseran yang nyata dan dalam.",
                "Perjalananmu bukan tentang menjadi orang lain, tapi tentang semakin jelas menjadi dirimu sendiri.",
                "Hidupmu penuh dengan persimpangan yang tidak ada di peta. Dan justru di situlah kamu paling hidup.",
                "Kamu sedang belajar bahwa kekuatanmu bukan hanya tentang apa yang kamu lakukan, tapi bagaimana kamu hadir.",
                "Tema terbesarmu adalah menemukan keberanian untuk menunjukkan sisi diri yang selama ini kamu jaga rapat.",
            ];
            var r = [
                "Bagian mana dari dirimu yang selama ini paling kamu lindungi — dan apa yang akan terjadi jika kamu membiarkannya dilihat?",
                "Jika kamu tidak takut gagal, langkah apa yang akan kamu ambil besok?",
                "Cerita apa tentang dirimu yang kamu ulangi terus — dan apakah itu masih benar?",
                "Apa yang orang terdekatmu lihat dalam dirimu yang belum kamu akui sendiri?",
                "Kapan terakhir kali kamu bertindak sesuai intuisi — dan apa yang terjadi?",
                "Hal apa yang kamu tahu harus kamu lepaskan, tapi belum juga kamu lakukan?",
                "Jika versi terbaik dirimu bisa berbicara kepadamu sekarang, apa yang pertama kali akan ia katakan?",
                "Apa yang kamu kejar selama ini — dan apakah itu benar-benar milikmu, atau milik ekspektasi orang lain?",
                "Di mana kamu merasa paling hidup — dan sudah berapa lama kamu tidak berada di sana?",
                "Apa yang akan berbeda dalam hidupmu jika kamu mulai mempercayai dirimu sendiri sepenuhnya?",
            ];
            var sy = [
                "Bintang Utara", "Kompas Tersembunyi", "Bulan Separuh", "Cincin Saturnus",
                "Peta Tak Bernama", "Api Abadi", "Mata Badai", "Akar Dalam",
                "Mercusuar", "Kedalaman Laut", "Gerhana", "Langit Fajar",
                "Batu Fondasi", "Sayap Tersimpan", "Cermin Retak", "Benih Tersembunyi",
            ];
            var st = {
                cosmic: { p: "Dari perspektif semesta,", c: "pola ini menunjukkan bahwa" },
                sage: { p: "Dalam keheningan kebijaksanaan,", c: "tersimpan kebenaran bahwa" },
                philosopher: { p: "Jika ditilik lebih dalam,", c: "ada pola logis yang menunjukkan" },
                storyteller: { p: "Dalam kisahmu,", c: "ada bab yang belum selesai di mana" },
                wanderer: { p: "Di malam yang panjang,", c: "ada suara pelan yang berkata bahwa" },
                starlord: { p: "Dari titik pengamatanku,", c: "polamu menunjukkan bahwa" },
            };
            return { a: a, h: h, s: s, b: b, lt: lt, r: r, sy: sy, st: st };
        })();

        // ═══════════════════════════════════════════════════
        //  SEEDED RANDOM
        // ═══════════════════════════════════════════════════
        function _rng(name) {
            var seed = 0;
            for (var i = 0; i < name.length; i++) seed += name.charCodeAt(i) * (i + 1) * 31;
            return function (max) {
                seed = (seed * 9301 + 49297) % 233280;
                return seed % max;
            };
        }

        function _pick(arr, n, rng) {
            var pool = arr.slice(), res = [];
            while (res.length < n && pool.length > 0) {
                var idx = rng(pool.length);
                res.push(pool.splice(idx, 1)[0]);
            }
            return res;
        }

        // ═══════════════════════════════════════════════════
        //  GENERATE
        // ═══════════════════════════════════════════════════
        function _gen(name, style) {
            var rng = _rng(name + style);
            var arch = _d.a[rng(_d.a.length)];
            var hidd = _d.h[rng(_d.h.length)];
            var them = _d.lt[rng(_d.lt.length)];
            var refl = _d.r[rng(_d.r.length)];
            var st = _d.st[style] || _d.st.starlord;
            var str = _pick(_d.s, 4, rng);
            var bln = _pick(_d.b, 3, rng);
            var sym = _pick(_d.sy, 3, rng);
            return {
                archetype: { name: arch.n, tagline: name + " " + arch.e + "." },
                hidden_pattern: { title: hidd.t, content: st.p + " " + name + ", " + st.c + " " + hidd.b },
                strengths: str,
                blind_spots: bln,
                life_theme: name + " \u2014 " + them,
                reflection: name + ", " + refl,
                symbols: sym
            };
        }

        // ═══════════════════════════════════════════════════
        //  STATE & UI HELPERS
        // ═══════════════════════════════════════════════════
        var currentData = null;

        function _$id(id) { return document.getElementById(id); }

        function showUnlock(icon, title, sub) {
            _$id("unlockIcon").textContent = icon;
            _$id("unlockTitle").textContent = title;
            _$id("unlockSub").textContent = sub;
            var el = _$id("unlockOverlay");
            el.classList.add("show");
            setTimeout(function () { el.classList.remove("show"); }, 1600);
        }

        function showToast(msg) {
            var t = _$id("toast");
            t.textContent = msg;
            t.classList.add("show");
            setTimeout(function () { t.classList.remove("show"); }, 2800);
        }

        // ═══════════════════════════════════════════════════
        //  RENDER CARDS
        // ═══════════════════════════════════════════════════
        function renderCards(data) {
            var container = _$id("results");
            var cards = [
                ["✦", "Archetype", "gold-border",
                    '<div class="card-title">' + data.archetype.name + '</div><div class="card-text">' + data.archetype.tagline + '</div>'],
                ["◈", "Hidden Pattern", "",
                    '<div class="card-title">' + data.hidden_pattern.title + '</div><div class="card-text">' + data.hidden_pattern.content + '</div>'],
                ["▲", "Strengths", "",
                    '<ul class="card-list">' + data.strengths.map(function (x) { return "<li>" + x + "</li>"; }).join("") + "</ul>"],
                ["◉", "Blind Spots", "",
                    '<ul class="card-list">' + data.blind_spots.map(function (x) { return "<li>" + x + "</li>"; }).join("") + "</ul>"],
                ["∞", "Life Theme", "",
                    '<div class="card-text">' + data.life_theme + '</div>'],
                ["◇", "Reflection", "violet-border",
                    '<div class="reflection-question">' + data.reflection + '</div>'],
                ["✧", "Symbolic Profile", "",
                    '<div class="symbol-row">' + data.symbols.map(function (x) { return '<span class="symbol-chip">' + x + '</span>'; }).join("") + '</div>'],
            ];

            container.style.display = "flex";
            container.innerHTML = cards.map(function (c) {
                return '<div class="card ' + c[2] + '">'
                    + '<div class="card-header"><span class="card-icon">' + c[0] + '</span><span class="card-label">' + c[1] + '</span></div>'
                    + '<div class="card-body">' + c[3] + '</div>'
                    + '</div>';
            }).join("");

            container.querySelectorAll(".card").forEach(function (el, i) {
                setTimeout(function () { el.classList.add("visible"); }, i * 200);
            });

            // Tampilkan tombol screenshot
            _$id("screenshotWrap").classList.add("show");
        }

        // ═══════════════════════════════════════════════════
        //  EXPLORE
        // ═══════════════════════════════════════════════════
        function doExplore() {
            var name = _$id("nameInput").value.trim();
            if (!name) { _$id("nameInput").focus(); return; }
            var style = _$id("styleSelect").value;

            _$id("emptyState").style.display = "none";
            _$id("errorCard").classList.remove("show");
            _$id("results").innerHTML = "";
            _$id("screenshotWrap").classList.remove("show");
            _$id("loading").classList.add("show");
            _$id("btnExplore").disabled = true;

            setTimeout(function () {
                try {
                    currentData = _gen(name, style);
                    _$id("loading").classList.remove("show");
                    showUnlock("✦", "Pola Ditemukan", "Membaca karakter " + name);
                    renderCards(currentData);
                } catch (e) {
                    _$id("loading").classList.remove("show");
                    var ec = _$id("errorCard");
                    ec.textContent = "Terjadi kesalahan. Coba lagi.";
                    ec.classList.add("show");
                } finally {
                    _$id("btnExplore").disabled = false;
                }
            }, 900);
        }

        // ═══════════════════════════════════════════════════
        //  SCREENSHOT — pakai html2canvas
        // ═══════════════════════════════════════════════════
        function doScreenshot() {
            if (!currentData) return;
            var btn = _$id("btnScreenshot");
            btn.classList.add("loading-ss");
            btn.innerHTML = "<span>⏳</span> Memproses...";

            var target = _$id("appRoot");

            html2canvas(target, {
                backgroundColor: "#07080f",
                scale: 2,
                useCORS: true,
                logging: false,
                // Jangan capture tombol screenshot itu sendiri
                ignoreElements: function (el) {
                    return el.id === "screenshotWrap";
                }
            }).then(function (canvas) {
                var name = _$id("nameInput").value.trim() || "pola";
                var link = document.createElement("a");
                link.download = "starlord-" + name.toLowerCase().replace(/\s+/g, "-") + ".png";
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.classList.remove("loading-ss");
                btn.innerHTML = "<span>📸</span> Simpan Hasil sebagai Gambar";
                showToast("✦ Gambar berhasil disimpan!");
            }).catch(function () {
                btn.classList.remove("loading-ss");
                btn.innerHTML = "<span>📸</span> Simpan Hasil sebagai Gambar";
                showToast("Gagal menyimpan. Coba lagi.");
            });
        }

        // ═══════════════════════════════════════════════════
        //  STYLE SELECTOR (hidden, hanya host yang tahu)
        // ═══════════════════════════════════════════════════
        // Selector disembunyikan di DOM tapi tetap berfungsi
        // Host bisa akses via konsol: setStyle('sage') — tapi konsol sudah diblokir utk umum
        var _currentStyle = "starlord";
        function setStyle(s) { _currentStyle = s; }

        // Override getElementById untuk styleSelect agar tetap kerja
        var _origGetEl = document.getElementById.bind(document);
        Object.defineProperty(window, '_currentStyle', { writable: true });

        // Inject style select tersembunyi
        (function () {
            var sel = document.createElement("select");
            sel.id = "styleSelect";
            sel.style.cssText = "position:fixed;bottom:8px;right:8px;opacity:0.01;width:1px;height:1px;pointer-events:none;z-index:-1;";
            ["cosmic", "sage", "philosopher", "storyteller", "wanderer", "starlord"].forEach(function (v, i) {
                var o = document.createElement("option");
                o.value = v; o.textContent = v;
                if (v === "starlord") o.selected = true;
                sel.appendChild(o);
            });
            document.body.appendChild(sel);
        })();

        // ═══════════════════════════════════════════════════
        //  EVENT LISTENERS
        // ═══════════════════════════════════════════════════
        _$id("btnExplore").addEventListener("click", doExplore);
        _$id("nameInput").addEventListener("keydown", function (e) { if (e.key === "Enter") doExplore(); });
        _$id("btnScreenshot").addEventListener("click", doScreenshot);
    </script>
