<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Identity Ritual</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at center, #1a0633, #0b0614 60%, #050505);
            overflow: hidden;
            color: white;
            font-family: system-ui;
        }

        /* mist aura */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.06), transparent 45%),
                radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.05), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.03), transparent 60%);
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes drift {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.15);
            }
        }

        /* layout */
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            z-index: 2;
            text-align: center;
        }

        /* realm title */
        .realm {
            font-size: 11px;
            letter-spacing: 5px;
            opacity: 0.5;
            text-transform: uppercase;
        }

        /* CARD */
        .card {
            width: 340px;
            height: 340px;
            border-radius: 30px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            position: relative;
            overflow: hidden;

            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(28px);

            border: 1px solid rgba(255, 255, 255, 0.12);

            animation: breathe 5s ease-in-out infinite;
        }

        /* life pulse */
        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 50px rgba(168, 85, 247, 0.12);
            }

            50% {
                transform: scale(1.03);
                box-shadow: 0 0 90px rgba(168, 85, 247, 0.22);
            }
        }

        /* mystical core sigil */
        .card::after {
            content: '✶';
            position: absolute;
            font-size: 160px;
            opacity: 0.04;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* NAME */
        .name {
            font-family: 'Orbitron', sans-serif;
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 3px;

            background: linear-gradient(90deg, #ffffff, #d8b4fe, #ffffff);
            -webkit-background-clip: text;
            color: transparent;

            text-shadow: 0 0 25px rgba(216, 180, 254, 0.25);
        }

        /* TITLE (lebih mistik) */
        .title {
            margin-top: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            opacity: 0.95;
            letter-spacing: 1px;
        }

        /* DESC (dibesarkan + lebih kuat) */
        .desc {
            margin-top: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            opacity: 0.75;
            max-width: 270px;
            line-height: 1.5;
        }

        /* input */
        input {
            padding: 11px;
            width: 220px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-align: center;
        }

        /* button ritual */
        button {
            padding: 12px 28px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 2px;

            background: linear-gradient(135deg, #5b21b6, #a855f7);
            color: white;

            transition: .2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* flash ritual */
        .flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
        }

        .flash.active {
            animation: flash .4s ease;
        }

        @keyframes flash {
            0% {
                opacity: 0;
            }

            30% {
                opacity: 0.2;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="flash" id="flash"></div>

    <div class="stage">

        <div class="realm">RITUAL IDENTITAS KOSMIK</div>

        <div class="card">

            <div class="name" id="name">MENUNGGU PANGGILAN</div>

            <div class="title" id="title">—</div>

            <div class="desc" id="desc">
                Setiap nama yang dipanggil bukan sekadar identitas, melainkan gema dari semesta yang lebih tua dari
                waktu. Ia muncul sebagai jejak kesadaran yang pernah ada di antara cahaya dan kehampaan.
            </div>

        </div>

        <input id="input" placeholder="ketik nama untuk dipanggil..." />

        <button onclick="summon()">PANGGIL IDENTITAS</button>

    </div>

    <script>

        const titles = [
            "Penjaga Cahaya Sunyi",
            "Pengembara Dimensi Bintang",
            "Pewaris Cahaya Kosmik",
            "Penulis Takdir di Ruang Hampa",
            "Pembawa Gema Nebula",
            "Penjaga Cahaya Purba",
            "Pengembara Void Abadi",
            "Penanda Jejak Semesta"
        ];

        const descs = [
            "Nama ini membawa getaran yang tidak lahir dari dunia ini, melainkan dari ruang antara kesadaran dan kehampaan.",
            "Identitas ini terbentuk dari pecahan cahaya yang tersisa setelah bintang kehilangan bentuknya.",
            "Di dalam nama ini tersimpan ingatan semesta yang tidak pernah diceritakan kepada manusia.",
            "Gema keberadaan ini hanya muncul ketika realitas sedang retak secara halus.",
            "Ini adalah jejak yang ditinggalkan oleh kesadaran yang pernah melintasi batas waktu."
        ];

        function rand(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function summon() {

            let name = document.getElementById("input").value.trim();
            if (!name) return;

            flash();

            setTimeout(() => {

                document.getElementById("name").innerText = name.toUpperCase();
                document.getElementById("title").innerText = rand(titles);
                document.getElementById("desc").innerText = rand(descs);

            }, 300);
        }

        function flash() {
            let f = document.getElementById("flash");
            f.classList.remove("active");
            void f.offsetWidth;
            f.classList.add("active");
        }

    </script>

</body>

</html>
