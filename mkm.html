<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0a0a0b;
            --surface: #111113;
            --border: #1e1e22;
            --text: #fafafa;
            --text-secondary: #6b6b72;
            --accent: #4f8fff;
            --accent-glow: rgba(79, 143, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        header {
            margin-bottom: 24px;
            padding: 0 4px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }

        header p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .tools-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tool-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            text-decoration: none;
            color: var(--text);
            border-radius: 8px;
            transition: background 0.12s ease;
            border: 1px solid transparent;
        }

        .tool-item:hover {
            background: var(--surface);
            border-color: var(--border);
        }

        .tool-item:active {
            background: var(--accent-glow);
            border-color: rgba(79, 143, 255, 0.2);
        }

        .tool-icon {
            width: 36px;
            height: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .tool-info {
            flex: 1;
            min-width: 0;
        }

        .tool-info h3 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 1px;
        }

        .tool-info span {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .tool-arrow {
            color: var(--text-secondary);
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.15s ease;
            font-size: 14px;
        }

        .tool-item:hover .tool-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(79, 143, 255, 0.15);
            color: var(--accent);
            margin-left: 4px;
            letter-spacing: 0.2px;
        }

        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Tools</h1>
            <p>Kalkulator & Jadwal Kerja</p>
        </header>

        <div class="tools-list">
            <a href="https://condrock.eu.org/tools/kalkulator-sph" target="_blank" class="tool-item">
                <div class="tool-icon">⌨</div>
                <div class="tool-info">
                    <h3>SPH Kalkulator</h3>
                    <span>Standar</span>
                </div>
                <div class="tool-arrow">→</div>
            </a>

            <a href="https://condrock.eu.org/tools/kalkulator-sph-jumat" target="_blank" class="tool-item">
                <div class="tool-icon">⌨</div>
                <div class="tool-info">
                    <h3>SPH Kalkulator <span class="badge">Jumat</span></h3>
                    <span>Special rate</span>
                </div>
                <div class="tool-arrow">→</div>
            </a>

            <a href="https://condrock.eu.org/tools/kalkulator-sph-cargloss" target="_blank" class="tool-item">
                <div class="tool-icon">⌨</div>
                <div class="tool-info">
                    <h3>SPH Kalkulator</h3>
                    <span>Operator Cargloss</span>
                </div>
                <div class="tool-arrow">→</div>
            </a>

            <a href="https://condrock.eu.org/tools/jadwal" target="_blank" class="tool-item">
                <div class="tool-icon">📅</div>
                <div class="tool-info">
                    <h3>Jadwal Kerja</h3>
                    <span>Shift 6-2</span>
                </div>
                <div class="tool-arrow">→</div>
            </a>
        </div>

        <footer>Internal Tools</footer>
    </div>
</body>

</html>
