<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Kalkulator SPH Cargloss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <meta property="og:title" content="Kalkulator SPH Cargloss">
    <meta property="og:description"
        content="Kalkulator SPH Cargloss untuk menghitung distribusi Standard Per Hour secara otomatis berdasarkan total barang dengan hasil perhitungan yang rapi dan cepat.">
    <meta property="og:image"
        content="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj3xKBO0SglcOHrP6ZbHEAFyXukN1CGwKSShMWv7hL_j1TAZN6FspzTaeBmbnj7drhZpCM6fvEqDJZMGOHzgvXSL8-AxXT5Mrs8nQ8D35QQzd0Uwz3UmFxTwaG-f6U3CV6xWj7IUiH8mO6RgGL5AmWkV6Nh4K-ZUjg9AHrjR0lN3cm20f4EZJ1Z22-Rg84/s1600/kalkulator-sph.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://condrock.eu.org/kalkulator-sph">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg1: #020617;
            --bg2: #0f172a;
            --card: rgba(255, 255, 255, .07);
            --border: rgba(255, 255, 255, .12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent2: #8b5cf6
        }

        * {
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(56, 189, 248, .20), transparent 30%), radial-gradient(circle at top right, rgba(139, 92, 246, .22), transparent 30%), linear-gradient(160deg, var(--bg1), var(--bg2));
            color: var(--text)
        }

        .shell {
            max-width: 920px
        }

        .glass {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .35)
        }

        .hero {
            padding: 28px
        }

        .badge-soft {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .45rem .8rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: #cbd5e1;
            font-size: .92rem
        }

        .title {
            font-weight: 800;
            letter-spacing: -.03em
        }

        .sub {
            color: var(--muted)
        }

        .input-lg,
        .btn-lg {
            border-radius: 14px
        }

        .input-lg {
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: .9rem 1rem
        }

        .input-lg:focus {
            background: rgba(255, 255, 255, .07);
            border-color: rgba(56, 189, 248, .55);
            box-shadow: 0 0 0 .25rem rgba(56, 189, 248, .12);
            color: var(--text)
        }

        .btn-action {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            font-weight: 700;
            box-shadow: 0 14px 30px rgba(56, 189, 248, .18)
        }

        .btn-action:hover {
            filter: brightness(1.05)
        }

        .table-wrap {
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid var(--border)
        }

        table {
            margin-bottom: 0 !important;
            color: #fff !important
        }

        thead th {
            background: rgba(255, 255, 255, .08) !important;
            color: #fff !important;
            border-color: var(--border) !important
        }

        tbody td {
            background: rgba(255, 255, 255, .03) !important;
            color: #fff !important;
            border-color: var(--border) !important
        }

        .empty-state {
            color: var(--muted);
            padding: 18px;
            text-align: center
        }

        .brand-link img {
            max-width: 100px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, .25))
        }

        @media (max-width:576px) {
            .hero {
                padding: 20px
            }

            .title {
                font-size: 1.4rem
            }
        }
    </style>
</head>

<body>
    <div class="container py-4 py-md-5 shell">
        <div class="glass hero mb-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
                <div>
                    <div class="badge-soft mb-3"><i class="bi bi-calculator"></i> Kalkulator Standard Per Hour</div>
                    <h1 class="title h2 mb-2">Kalkulator SPH Cargloss</h1>
                    <p class="sub mb-0">Masukkan total barang untuk menghitung distribusi SPH secara otomatis.</p>
                </div>
            </div>

            <div class="row g-3 align-items-end">
                <div class="col-12 col-md-8">
                    <label for="totalBarang" class="form-label fw-semibold">Total Barang</label>
                    <input type="number" id="totalBarang" class="form-control form-control-lg input-lg" min="1"
                        placeholder="Masukkan total barang">
                </div>
                <div class="col-12 col-md-4">
                    <button class="btn btn-lg btn-action w-100 text-white" onclick="hitungDistribusi()"><i
                            class="bi bi-lightning-charge me-1"></i> Hitung</button>
                </div>
            </div>
        </div>

        <div class="glass p-3 p-md-4 mb-4">
            <h2 class="h5 mb-3 fw-bold">Hasil Perhitungan SPH</h2>
            <div class="table-wrap">
                <table class="table table-bordered align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Total Kumulatif</th>
                            <th>SPH</th>
                        </tr>
                    </thead>
                    <tbody id="hasilDistribusi">
                        <tr>
                            <td colspan="2" class="empty-state">Belum ada hasil. Silakan masukkan total barang.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="https://condrock.eu.org/" target="_blank" class="brand-link">
                <img src="images/condrock.png" alt="condrock">
            </a>
        </div>
    </div>

    <script>
        function hitungDistribusi() {
            let totalBarang = parseInt(document.getElementById('totalBarang').value);
            if (isNaN(totalBarang) || totalBarang <= 0) {
                alert('Masukkan jumlah barang yang valid!');
                return;
            }
            let hasilDistribusi = document.getElementById('hasilDistribusi');
            hasilDistribusi.innerHTML = '';
            let jamPenuh = 6;
            let barangPerJamPenuh = Math.ceil(totalBarang / 7);
            let sisa = totalBarang - (barangPerJamPenuh * jamPenuh);
            let barangJam1 = Math.floor(sisa / 2);
            let barangJam8 = sisa - barangJam1;
            let distribusi = [];
            distribusi.push({ jam: 1, jumlah: barangJam1 });
            for (let i = 2; i <= 7; i++) distribusi.push({ jam: i, jumlah: barangPerJamPenuh });
            distribusi.push({ jam: 8, jumlah: barangJam8 });
            let output = '';
            let totalKumulatif = 0;
            distribusi.forEach(row => {
                totalKumulatif += row.jumlah;
                output += `<tr><td>${totalKumulatif}</td><td>${row.jumlah}</td></tr>`;
            });
            hasilDistribusi.innerHTML = output;
        }
    </script>

    <script>
        function disableSelection(e) { void 0 !== e.onselectstart ? e.onselectstart = function () { return !1 } : void 0 !== e.style.MozUserSelect ? e.style.MozUserSelect = "none" : e.onmousedown = function () { return !1 }, e.style.cursor = "default" }
        function mousedwn(e) { try { if (2 == e.button || 3 == e.button) return !1 } catch (e) { if (3 == e.which) return !1 } }
        window.onload = function () { disableSelection(document.body) }, document.oncontextmenu = function () { return !1 }, document.ondragstart = function () { return !1 }, document.onmousedown = mousedwn, document.onkeydown = function (e) { return !e.ctrlKey || 67 !== e.keyCode && 86 !== e.keyCode && 85 !== e.keyCode && 117 !== e.keyCode ? 123 == e.keyCode || 18 == e.keyCode ? (e.preventDefault(), !1) : void 0 : (e.preventDefault(), !1) };
    </script>
</body>

</html>
