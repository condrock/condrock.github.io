<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #12121a, #1e263a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: rgba(30, 30, 48, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(100, 100, 160, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            margin-top: 1.5rem;
        }

        .logo-container img {
            width: 70%;
            max-width: 180px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .info-text {
            font-size: 0.95rem;
            margin-top: 0.8rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(20, 20, 32, 0.7);
            color: #fff;
            padding: 0.8rem 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control:focus {
            color: #0dcaf0;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.4);
            background: rgba(25, 25, 40, 0.85);
        }

        .form-control::placeholder {
            color: #0dcaf0;
            opacity: 0.3;
        }

        .submit-btn {
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #0b63f6, #0dcaf0);
            padding: 0.8rem 0;
            font-weight: 600;
            transition: 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .submit-btn:hover {
            background: linear-gradient(90deg, #0a58ca, #0d9bf2);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 123, 255, 0.4);
        }

        .container {
            max-width: 420px;
        }

        @media (max-width: 576px) {
            .container {
                max-width: 90%;
            }

            .logo-container img {
                width: 80%;
            }
        }
    </style>
</head>

<body class="bg-dark text-white">

    <div class="container">
        <div class="login-card p-3">
            <div class="logo-container">
                <img src="images/condrock.png" alt="Logo Condrock">
            </div>

            <div class="info-text text-center text-white">
                <i class="fa-solid fa-circle-info me-1"></i>
                Login untuk mengakses bonus.
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" id="username" class="form-control" placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary btn-lg w-100 submit-btn">
                        Login <i class="fa-solid fa-right-to-bracket ms-1"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;

            if (username === 'membercondrock' && password === 'condrock007') {
                localStorage.setItem('loggedIn', true);
                window.location.href = 'bonus.html';
            } else {
                alert('Username atau password salah. Silakan coba lagi.');
            }
        });
    </script>

</body>

</html>
