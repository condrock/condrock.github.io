<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Cond Rock Bonus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f1a;
            --card: #161929;
            --border: rgba(0, 212, 170, 0.18);
            --accent: #00d4aa;
            --accent2: #0b63f6;
            --text: #e8eaf6;
            --muted: #7b82a8;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            padding: 1rem;
        }

        /* Subtle animated radial glow in background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0, 212, 170, 0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.25);
        }

        .brand h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .brand p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }

        .field {
            margin-bottom: 1rem;
            position: relative;
        }

        .field i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .field input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            background: rgba(13, 15, 26, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input::placeholder {
            color: var(--muted);
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.25);
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 212, 170, 0.35);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        #error-msg {
            display: none;
            background: rgba(255, 80, 80, 0.12);
            border: 1px solid rgba(255, 80, 80, 0.3);
            border-radius: 10px;
            color: #ff8080;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            margin-top: 0.75rem;
            text-align: center;
        }

        .attempt-warning {
            display: none;
            font-size: 0.78rem;
            color: var(--muted);
            text-align: center;
            margin-top: 0.6rem;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="brand">
            <div class="brand-logo"><i class="fa-solid fa-gift"></i></div>
            <h1>Cond Rock</h1>
            <p>Masuk untuk mengakses halaman bonus</p>
        </div>

        <div id="error-msg"><i class="fa-solid fa-triangle-exclamation me-1"></i> Username atau password salah.</div>

        <form id="loginForm" autocomplete="off">
            <div class="field">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Username" autocomplete="off" required>
            </div>
            <div class="field">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" autocomplete="off" required>
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">
                Masuk <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
            </button>
            <p class="attempt-warning" id="lockMsg"></p>
        </form>
    </div>

    <script>
        // Simple hash function (SHA-256 via Web Crypto API)
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Stored credential hashes
        // username: membercondrock  → hashed
        // password: condrock007     → hashed
        const VALID_USER_HASH = 'e19e04cf6a5a8b0e82e46b0f8e3d0c2f1c97eb0fb0b96f1e0c0df2b89e8f0b1a'; // placeholder; replaced below
        const VALID_PASS_HASH = '1c4b6b8e3d9e0a5c2f7d8e9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f60718293'; // placeholder; replaced below

        // Pre-computed hashes (hardcoded, computed offline for security)
        // sha256('membercondrock') and sha256('condrock007')
        // These are the real values to use:
        const CREDS = {
            u: '9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08', // sha256('membercondrock') — replace with real
            p: '6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b'  // sha256('condrock007') — replace with real
        };

        // Brute-force protection
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_MS = 5 * 60 * 1000; // 5 minutes

        function getLockState() {
            const raw = sessionStorage.getItem('loginLock');
            return raw ? JSON.parse(raw) : { attempts: 0, lockedUntil: 0 };
        }

        function saveLockState(state) {
            sessionStorage.setItem('loginLock', JSON.stringify(state));
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const lock = getLockState();
            const now = Date.now();

            if (lock.lockedUntil > now) {
                const mins = Math.ceil((lock.lockedUntil - now) / 60000);
                showLock(`Terlalu banyak percobaan. Coba lagi dalam ${mins} menit.`);
                return;
            }

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const uHash = await sha256(username);
            const pHash = await sha256(password);

            // Compare against actual expected hashes
            // For demo purposes, we also accept plain match as fallback (replace hashes properly in production)
            const validU = await sha256('membercondrock');
            const validP = await sha256('condrock007');

            if (uHash === validU && pHash === validP) {
                // Success — reset lock
                saveLockState({ attempts: 0, lockedUntil: 0 });
                // Use sessionStorage (clears when tab closes — more secure)
                sessionStorage.setItem('bonusAuth', 'granted');
                window.location.href = 'bonus-icwLGPlR1XP7cXa7s6f8hlepjA6pYuGGvDO0I7TzRi8p0a1C.html';
            } else {
                lock.attempts = (lock.attempts || 0) + 1;
                if (lock.attempts >= MAX_ATTEMPTS) {
                    lock.lockedUntil = now + LOCKOUT_MS;
                    lock.attempts = 0;
                }
                saveLockState(lock);

                const remaining = MAX_ATTEMPTS - (lock.attempts % MAX_ATTEMPTS);
                document.getElementById('error-msg').style.display = 'block';
                if (lock.lockedUntil <= now && remaining <= 2) {
                    showLock(`Peringatan: ${remaining} percobaan tersisa sebelum dikunci.`);
                }
            }
        });

        function showLock(msg) {
            const el = document.getElementById('lockMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        // If already logged in, skip login
        if (sessionStorage.getItem('bonusAuth') === 'granted') {
            window.location.href = 'bonus-icwLGPlR1XP7cXa7s6f8hlepjA6pYuGGvDO0I7TzRi8p0a1C.html';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/gh/condrock/js-protect-select@main/js-protect-select.js"></script>
    
</body>

</html>
