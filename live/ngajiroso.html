<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ngaji Roso Engine</title>
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --indigo-deep: #0d0f1e;
            --indigo-mid: #131629;
            --indigo-soft: #1c2040;
            --gold: #c8a84b;
            --gold-light: #e8c87a;
            --gold-dim: #7a6229;
            --cream: #f2ead8;
            --cream-dim: #bfb49a;
            --white: #ffffff;
            --panel-bg: #111318;
            --panel-border: #2a2d3a;
            --btn-free: #2d4a2d;
            --btn-kecil: #2d3a4a;
            --btn-lumayan: #3a2d4a;
            --btn-besar: #4a2d2d;
            --btn-gede: #6b3a0f;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #080a10;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ===== LAYOUT ===== */
        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ===== LEFT PANEL ===== */
        .left-panel {
            width: 280px;
            min-width: 240px;
            background: var(--panel-bg);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            gap: 16px;
            overflow-y: auto;
            z-index: 10;
        }

        .left-panel h2 {
            color: #888;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--panel-border);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            color: #666;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group input {
            background: #1a1c25;
            border: 1px solid #2e3245;
            border-radius: 6px;
            color: #ddd;
            font-size: 14px;
            padding: 9px 12px;
            outline: none;
            transition: border-color .2s;
        }

        .input-group input:focus {
            border-color: var(--gold-dim);
        }

        .input-group input::placeholder {
            color: #444;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-group label {
            color: #666;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .ctrl-btn {
            padding: 11px 14px;
            border: 1px solid transparent;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .5px;
            text-align: left;
            transition: filter .15s, transform .1s;
            color: #ddd;
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn::after {
            content: '';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: .6;
        }

        .ctrl-btn:hover {
            filter: brightness(1.3);
            transform: translateX(2px);
        }

        .ctrl-btn:active {
            transform: translateX(1px) scale(.98);
        }

        .btn-free {
            background: var(--btn-free);
            border-color: #3a5e3a;
        }

        .btn-free::after {
            background: #5af07a;
        }

        .btn-kecil {
            background: var(--btn-kecil);
            border-color: #3a4d6e;
        }

        .btn-kecil::after {
            background: #5ab0f0;
        }

        .btn-lumayan {
            background: var(--btn-lumayan);
            border-color: #5a3a6e;
        }

        .btn-lumayan::after {
            background: #b05af0;
        }

        .btn-besar {
            background: var(--btn-besar);
            border-color: #6e3a3a;
        }

        .btn-besar::after {
            background: #f05a5a;
        }

        .btn-gede {
            background: var(--btn-gede);
            border-color: #8b5010;
        }

        .btn-gede::after {
            background: #f0a030;
        }

        .status-bar {
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid var(--panel-border);
            color: #444;
            font-size: 11px;
            line-height: 1.6;
        }

        .status-bar span {
            color: #666;
        }

        /* ===== RIGHT PANEL (DISPLAY STAGE) — CINEMATIC ===== */
        .right-panel {
            flex: 1;
            background:
                radial-gradient(ellipse 80% 70% at 50% 60%, #0e0820 0%, #05060f 55%, #000008 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Deep cinematic ambient layers */
        .right-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 45% at 50% 50%, rgba(110, 60, 200, .13) 0%, transparent 60%),
                radial-gradient(ellipse 80% 40% at 15% 90%, rgba(40, 20, 140, .18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 85% 10%, rgba(20, 10, 100, .12) 0%, transparent 50%),
                radial-gradient(ellipse 40% 50% at 50% 100%, rgba(80, 40, 160, .10) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        /* Vignette overlay */
        .right-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, rgba(0, 0, 5, .65) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Particle canvas sits behind everything */
        #particleCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: .55;
        }

        /* Corner decorations */
        .corner {
            position: absolute;
            width: 48px;
            height: 48px;
            border-color: rgba(200, 168, 75, .28);
            border-style: solid;
            z-index: 3;
            transition: border-color .6s, opacity .6s;
        }

        .corner-tl {
            top: 22px;
            left: 22px;
            border-width: 1.5px 0 0 1.5px;
        }

        .corner-tr {
            top: 22px;
            right: 22px;
            border-width: 1.5px 1.5px 0 0;
        }

        .corner-bl {
            bottom: 22px;
            left: 22px;
            border-width: 0 0 1.5px 1.5px;
        }

        .corner-br {
            bottom: 22px;
            right: 22px;
            border-width: 0 1.5px 1.5px 0;
        }

        /* Broadcast label */
        .broadcast-label {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: rgba(200, 168, 75, .45);
            font-weight: 700;
            z-index: 3;
        }

        .broadcast-label::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #e03a3a;
            box-shadow: 0 0 10px #e03a3a, 0 0 20px rgba(224, 58, 58, .4);
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .15;
            }
        }

        /* Stage center */
        .stage {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* ===== WAITING STATE ===== */
        .state-waiting {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeIn .6s ease;
        }

        .waiting-symbol {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .waiting-symbol svg {
            width: 100%;
            height: 100%;
            animation: slowSpin 20s linear infinite;
            opacity: .5;
        }

        .waiting-symbol .inner-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 20px var(--gold), 0 0 40px rgba(200, 168, 75, .3);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes slowSpin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 20px var(--gold), 0 0 40px rgba(200, 168, 75, .3);
            }

            50% {
                box-shadow: 0 0 30px var(--gold), 0 0 70px rgba(200, 168, 75, .5);
            }
        }

        .waiting-title {
            color: var(--gold-light);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-family: Georgia, 'Times New Roman', serif;
        }

        .waiting-sub {
            color: var(--cream-dim);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: .5;
        }

        .waiting-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
        }

        /* ===== LOADING STATE ===== */
        .state-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            animation: fadeIn .4s ease;
        }

        .loading-mandala {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .loading-mandala svg {
            width: 100%;
            height: 100%;
        }

        .ring {
            transform-origin: 70px 70px;
            fill: none;
        }

        .ring-1 {
            animation: spinCW 1.2s linear infinite;
        }

        .ring-2 {
            animation: spinCCW 1.8s linear infinite;
        }

        .ring-3 {
            animation: spinCW 2.4s linear infinite;
        }

        @keyframes spinCW {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spinCCW {
            to {
                transform: rotate(-360deg);
            }
        }

        .loading-name {
            color: var(--gold-light);
            font-size: 22px;
            font-family: Georgia, serif;
            font-style: italic;
            letter-spacing: 2px;
            animation: fadeGlow 1.5s ease-in-out infinite;
        }

        @keyframes fadeGlow {

            0%,
            100% {
                opacity: .7;
                text-shadow: 0 0 10px rgba(200, 168, 75, .3);
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 25px rgba(200, 168, 75, .7);
            }
        }

        .loading-label {
            color: var(--cream-dim);
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: .5;
        }

        /* ===== RESULT STATE ===== */
        .state-result {
            animation: revealCard .75s cubic-bezier(.16, 1, .3, 1);
            width: min(600px, 90%);
            position: relative;
            z-index: 4;
        }

        @keyframes revealCard {
            from {
                opacity: 0;
                transform: translateY(28px) scale(.955);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
            }
        }

        .result-card {
            /* Glassmorphism base */
            background:
                linear-gradient(145deg,
                    rgba(22, 18, 50, .82) 0%,
                    rgba(14, 12, 36, .88) 50%,
                    rgba(8, 7, 22, .90) 100%);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid rgba(200, 168, 75, .22);
            border-radius: 22px;
            padding: 38px 44px 34px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(200, 168, 75, .04),
                0 8px 32px rgba(0, 0, 3, .55),
                0 32px 80px rgba(0, 0, 8, .70),
                inset 0 1px 0 rgba(255, 255, 255, .06),
                inset 0 -1px 0 rgba(0, 0, 0, .3);
            transition: border-color .5s, box-shadow .5s;
        }

        /* Top shimmer line */
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 8%;
            right: 8%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 168, 75, .35), transparent);
            transition: background .5s;
        }

        /* Inner ambient top glow */
        .result-card::after {
            content: '';
            position: absolute;
            top: -80px;
            left: -80px;
            right: -80px;
            height: 220px;
            background: radial-gradient(ellipse, rgba(200, 168, 75, .05) 0%, transparent 68%);
            pointer-events: none;
            transition: background .5s;
        }

        /* Shimmer sweep element — only active on .aura-divine */
        .card-shimmer {
            position: absolute;
            inset: 0;
            border-radius: 22px;
            overflow: hidden;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
        }

        .card-shimmer::before {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(105deg,
                    transparent 30%,
                    rgba(255, 220, 100, .07) 50%,
                    rgba(255, 240, 160, .12) 55%,
                    rgba(255, 220, 100, .07) 60%,
                    transparent 70%);
            transform: skewX(-15deg);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
            gap: 16px;
        }

        .card-sender {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sender-label {
            color: var(--gold-dim);
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .sender-name {
            color: var(--gold-light);
            font-size: 20px;
            font-family: Georgia, serif;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .card-tier {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .tier-label {
            color: var(--gold-dim);
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .tier-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Tier badge colors — new names */
        .tier-awakening {
            background: rgba(90, 240, 122, .12);
            color: #5af07a;
            border: 1px solid rgba(90, 240, 122, .30);
        }

        .tier-mana {
            background: rgba(90, 176, 240, .12);
            color: #5ab0f0;
            border: 1px solid rgba(90, 176, 240, .30);
        }

        .tier-mystic {
            background: rgba(176, 90, 240, .14);
            color: #c87af0;
            border: 1px solid rgba(176, 90, 240, .35);
        }

        .tier-celestial {
            background: rgba(240, 90, 160, .12);
            color: #f05ab0;
            border: 1px solid rgba(240, 90, 160, .35);
        }

        .tier-divine {
            background: rgba(240, 180, 48, .15);
            color: #f0c030;
            border: 1px solid rgba(240, 180, 48, .45);
        }

        /* ============================================================
     TIER AURA VISUAL SYSTEM
     AWAKENING   → flat minimal, barely-there green tint
     MANA SPARK  → soft blue glow, gentle pulse
     MYSTIC      → vivid purple gradient, alive border
     CELESTIAL   → gold accent, warm subtle shimmer
     DIVINE      → full gold shimmer sweep + aura pulse
     ============================================================ */

        /* AWAKENING — flat minimal */
        .aura-awakening {
            border-color: rgba(90, 240, 122, .22) !important;
            box-shadow:
                0 0 0 1px rgba(90, 240, 122, .05),
                0 8px 32px rgba(0, 0, 3, .55),
                0 32px 80px rgba(0, 0, 8, .68),
                inset 0 1px 0 rgba(90, 240, 122, .08),
                inset 0 -1px 0 rgba(0, 0, 0, .3);
        }

        .aura-awakening::before {
            background: linear-gradient(90deg, transparent, rgba(90, 240, 122, .20), transparent) !important;
        }

        .aura-awakening::after {
            background: radial-gradient(ellipse, rgba(90, 240, 122, .04) 0%, transparent 65%) !important;
        }

        /* MANA SPARK — soft glow, animate */
        .aura-mana {
            border-color: rgba(90, 176, 240, .30) !important;
            box-shadow:
                0 0 0 1px rgba(90, 176, 240, .07),
                0 8px 32px rgba(0, 0, 3, .55),
                0 32px 80px rgba(0, 0, 8, .68),
                0 0 55px rgba(90, 176, 240, .12),
                inset 0 1px 0 rgba(90, 176, 240, .13),
                inset 0 -1px 0 rgba(0, 0, 0, .3);
            animation: manaGlow 4s ease-in-out infinite;
        }

        .aura-mana::before {
            background: linear-gradient(90deg, transparent, rgba(90, 176, 240, .28), transparent) !important;
        }

        .aura-mana::after {
            background: radial-gradient(ellipse, rgba(90, 176, 240, .07) 0%, transparent 65%) !important;
        }

        @keyframes manaGlow {

            0%,
            100% {
                box-shadow: 0 0 0 1px rgba(90, 176, 240, .07), 0 8px 32px rgba(0, 0, 3, .55), 0 32px 80px rgba(0, 0, 8, .68), 0 0 55px rgba(90, 176, 240, .12), inset 0 1px 0 rgba(90, 176, 240, .13), inset 0 -1px 0 rgba(0, 0, 0, .3);
            }

            50% {
                box-shadow: 0 0 0 1px rgba(90, 176, 240, .12), 0 8px 32px rgba(0, 0, 3, .55), 0 32px 80px rgba(0, 0, 8, .68), 0 0 80px rgba(90, 176, 240, .20), inset 0 1px 0 rgba(90, 176, 240, .20), inset 0 -1px 0 rgba(0, 0, 0, .3);
            }
        }

        /* MYSTIC ESSENCE — gradient border + alive purple */
        .aura-mystic {
            border-color: rgba(176, 90, 240, .42) !important;
            background:
                linear-gradient(145deg,
                    rgba(30, 16, 60, .88) 0%,
                    rgba(18, 10, 42, .90) 50%,
                    rgba(10, 6, 28, .92) 100%) !important;
            box-shadow:
                0 0 0 1px rgba(176, 90, 240, .10),
                0 8px 32px rgba(0, 0, 3, .55),
                0 32px 80px rgba(0, 0, 8, .70),
                0 0 70px rgba(176, 90, 240, .18),
                0 0 120px rgba(130, 60, 200, .08),
                inset 0 1px 0 rgba(200, 120, 255, .16),
                inset 0 -1px 0 rgba(0, 0, 0, .3);
            animation: mysticBreath 5s ease-in-out infinite;
        }

        .aura-mystic::before {
            background: linear-gradient(90deg, transparent, rgba(176, 90, 240, .40), transparent) !important;
        }

        .aura-mystic::after {
            background: radial-gradient(ellipse, rgba(176, 90, 240, .10) 0%, transparent 62%) !important;
        }

        @keyframes mysticBreath {

            0%,
            100% {
                border-color: rgba(176, 90, 240, .42) !important;
            }

            50% {
                border-color: rgba(200, 110, 255, .62) !important;
            }
        }

        /* CELESTIAL AURA — warm gold accent, richer presence */
        .aura-celestial {
            border-color: rgba(220, 170, 60, .48) !important;
            background:
                linear-gradient(145deg,
                    rgba(30, 22, 10, .88) 0%,
                    rgba(18, 14, 6, .90) 50%,
                    rgba(10, 8, 4, .92) 100%) !important;
            box-shadow:
                0 0 0 1px rgba(220, 170, 60, .12),
                0 8px 32px rgba(0, 0, 3, .55),
                0 32px 80px rgba(0, 0, 8, .70),
                0 0 70px rgba(200, 150, 40, .16),
                0 0 130px rgba(180, 130, 30, .07),
                inset 0 1px 0 rgba(255, 210, 80, .18),
                inset 0 -1px 0 rgba(0, 0, 0, .35);
            animation: celestialAura 5s ease-in-out infinite;
        }

        .aura-celestial::before {
            background: linear-gradient(90deg, transparent, rgba(220, 175, 65, .48), transparent) !important;
        }

        .aura-celestial::after {
            background: radial-gradient(ellipse, rgba(200, 160, 50, .09) 0%, transparent 60%) !important;
        }

        @keyframes celestialAura {

            0%,
            100% {
                box-shadow: 0 0 0 1px rgba(220, 170, 60, .12), 0 8px 32px rgba(0, 0, 3, .55), 0 32px 80px rgba(0, 0, 8, .70), 0 0 70px rgba(200, 150, 40, .16), 0 0 130px rgba(180, 130, 30, .07), inset 0 1px 0 rgba(255, 210, 80, .18), inset 0 -1px 0 rgba(0, 0, 0, .35);
            }

            50% {
                box-shadow: 0 0 0 1px rgba(220, 170, 60, .20), 0 8px 32px rgba(0, 0, 3, .55), 0 32px 80px rgba(0, 0, 8, .70), 0 0 95px rgba(200, 155, 45, .26), 0 0 170px rgba(180, 130, 30, .12), inset 0 1px 0 rgba(255, 220, 90, .28), inset 0 -1px 0 rgba(0, 0, 0, .35);
            }
        }

        /* DIVINE ASCENSION — gold shimmer sweep + deep aura pulse */
        .aura-divine {
            border-color: rgba(240, 200, 55, .60) !important;
            background:
                linear-gradient(145deg,
                    rgba(34, 26, 8, .90) 0%,
                    rgba(22, 16, 4, .92) 50%,
                    rgba(12, 9, 2, .94) 100%) !important;
            box-shadow:
                0 0 0 1px rgba(240, 200, 55, .20),
                0 8px 32px rgba(0, 0, 3, .55),
                0 32px 80px rgba(0, 0, 8, .72),
                0 0 90px rgba(240, 185, 45, .28),
                0 0 160px rgba(220, 165, 30, .14),
                0 0 240px rgba(200, 145, 20, .06),
                inset 0 1px 0 rgba(255, 230, 90, .30),
                inset 0 -1px 0 rgba(0, 0, 0, .40);
            animation: divineAuraPulse 3.5s ease-in-out infinite;
        }

        .aura-divine::before {
            background: linear-gradient(90deg, transparent, rgba(240, 205, 65, .60), transparent) !important;
        }

        .aura-divine::after {
            background: radial-gradient(ellipse, rgba(220, 175, 50, .13) 0%, transparent 55%) !important;
        }

        @keyframes divineAuraPulse {

            0%,
            100% {

            for (let i = 0; i < str.length; i++) {

                h = (h * 16777619) >>> 0; // keep 32-bit unsigned

            return h;

        // ============================================================

        function setState(id) {
            ["stateWaiting", "stateLoading", "stateResult"].forEach(s => {
                const el = document.getElementById(s);
                if (s === id) el.classList.remove("hidden");
                else el.classList.add("hidden");
            });
        }

        function setStatus(text) {
            document.getElementById("statusText").textContent = text;
        }

        // ============================================================
        // SECTION 5: AURA APPLICATOR
        // Apply tier-specific glow/shadow to result-card only
        // ============================================================

        function applyAura(tier) {
            const card = document.querySelector(".result-card");
            const shimmer = document.getElementById("cardShimmer");
            ALL_AURAS.forEach(a => card.classList.remove(a));
            card.classList.add(TIER_CONFIG[tier].aura);
            // Shimmer sweep active only for divine tier
            if (tier === "divine") {
                shimmer.classList.add("active");
            } else {
                shimmer.classList.remove("active");
            }
        }

        // ============================================================
        // SECTION 6: MAIN GENERATE FUNCTION
        // ============================================================

        let isGenerating = false;

        function generate(btn) {
            if (isGenerating) return;

            const tier = btn.dataset.tier;
            const nama = document.getElementById("inputNama").value.trim() || "Anonim";
            const tcfg = TIER_CONFIG[tier];

            isGenerating = true;
            setStatus("Membaca roso " + nama + "...");

            // Update loading name
            document.getElementById("loadingName").textContent = nama;
            setState("stateLoading");

            // Build seed from nama + hour + tier
            const seed = buildSeed(nama, tier);
            const seedObj = { s: seed };

            // Delay: 900ms–1500ms (slightly longer for higher tiers = feels more dramatic)
            const tierDelays = { awakening: 900, mana: 1000, mystic: 1100, celestial: 1250, divine: 1500 };
            const delay = tierDelays[tier] + Math.floor((seed % 400));

            setTimeout(() => {
                // --- Pick content via seeded RNG (same nama+hour+tier = same result) ---
                const pesan = seededPick(DATA.pesanRoso, seedObj);
                const archetype = seededPick(DATA.archetypes, seedObj);
                const pola = seededPick(DATA.pola, seedObj);
                const opening = seededPick(DATA.opening[tier], seedObj);
                const refleksi = seededPick(DATA.refleksi[tier], seedObj);
                const penutup = seededPick(DATA.penutup[tier], seedObj);

                // --- Inject into DOM (structure unchanged) ---
                document.getElementById("resultNama").textContent = nama;
                document.getElementById("resultPesan").textContent = pesan;
                document.getElementById("resultArchetype").textContent = archetype;
                document.getElementById("resultPola").textContent = pola;
                document.getElementById("resultOpening").textContent = opening;
                document.getElementById("resultRefleksi").textContent = refleksi;
                document.getElementById("resultPenutup").textContent = penutup;

                // --- Badge ---
                const badge = document.getElementById("resultTierBadge");
                badge.textContent = tcfg.label;
                badge.className = "tier-badge " + tcfg.badge;

                // --- Apply tier aura to card ---
                applyAura(tier);

                // --- Show result ---
                setState("stateResult");
                setStatus("Terakhir: " + nama + " · " + tcfg.label);
                isGenerating = false;
            }, delay);
        }

        // ============================================================
        // SECTION 8: PARTICLE SYSTEM (floating ambient dots)
        // Pure canvas, no libraries. Subtle, cinematic.
        // ============================================================

        (function initParticles() {
            const canvas = document.getElementById("particleCanvas");
            const ctx = canvas.getContext("2d");
            let W, H, particles;

            const COUNT = 55;

            function resize() {
                W = canvas.width = canvas.offsetWidth;
                H = canvas.height = canvas.offsetHeight;
            }

            function mkParticle() {
                const hues = [240, 260, 280, 210, 200, 50];
                const h = hues[Math.floor(Math.random() * hues.length)];
                return {
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: 0.4 + Math.random() * 1.4,
                    vx: (Math.random() - .5) * 0.18,
                    vy: -(0.05 + Math.random() * 0.22),
                    alpha: 0.0,
                    maxA: 0.08 + Math.random() * 0.22,
                    phase: Math.random() * Math.PI * 2,
                    spd: 0.003 + Math.random() * 0.005,
                    h,
                    s: 60 + Math.random() * 30,
                    l: 55 + Math.random() * 35,
                };
            }

            function initParticleArr() {
                particles = Array.from({ length: COUNT }, () => {
                    const p = mkParticle();
                    p.alpha = Math.random() * p.maxA;
                    return p;
                });
            }

            function tick() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(p => {
                    p.phase += p.spd;
                    p.alpha = p.maxA * (0.5 + 0.5 * Math.sin(p.phase));
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.y < -6) { p.y = H + 4; p.x = Math.random() * W; }
                    if (p.x < -6) { p.x = W + 4; }
                    if (p.x > W + 6) { p.x = -4; }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.h},${p.s}%,${p.l}%,${p.alpha})`;
                    ctx.fill();
                });
                requestAnimationFrame(tick);
            }

            window.addEventListener("resize", resize);
            resize();
            initParticleArr();
            requestAnimationFrame(tick);
        })();
    </script>
